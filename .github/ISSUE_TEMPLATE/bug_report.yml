name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproducible example
      description: |
        A self-contained snippet that demonstrates the issue. Include molecule coordinates,
        restraint setup, and the `Molpack::pack()` call that triggers the bug.
      render: rust
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include the full error message or panic output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: molcrafts-molpack version
      placeholder: "e.g. 0.1.0 (cargo tree | grep molcrafts-molpack)"
    validations:
      required: true

  - type: input
    id: rust
    attributes:
      label: Rust toolchain
      placeholder: "e.g. rustc 1.85.0 (stable)"
    validations:
      required: true

  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options:
        - Rust API
        - Python bindings
        - Both
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: OS, feature flags, any other relevant information.

name: Publish molcrafts-molpack to PyPI

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Build matrix produces one wheel per OS for the latest Python (3.13).
# Linux + macOS only; macOS wheel is universal2 so a single artifact covers
# both Apple Silicon and Intel Macs. sdist is kept as a safety net so users
# on unlisted platforms (Windows, Linux aarch64, …) can still build from
# source if they have a Rust toolchain.
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          manylinux: auto
          command: build
          args: --release --out dist --interpreter python3.13
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux
          path: python/dist

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: build
          args: --release --out dist --interpreter python3.13 --target universal2-apple-darwin
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos
          path: python/dist

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: python/dist

  publish:
    needs: [build-linux, build-macos, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

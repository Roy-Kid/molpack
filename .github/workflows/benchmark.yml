name: Benchmark

# Continuous performance tracking via benchmark-action/github-action-benchmark,
# stored under `dev/bench` on the gh-pages branch.
#
# Runs the end-to-end `pack_end_to_end` criterion bench for the three fast
# example cases (mixture / interface / bilayer, ~1–5 min each). The two heavy
# cases (solvprotein ~5–15 min, spherical ~30–60 min) are deliberately excluded
# from CI tracking — run them locally with
# `cargo bench --bench pack_end_to_end --features io` when needed.
#
# molpack builds against the PUBLISHED molrs crate (the `path = "../molrs/..."`
# keys in Cargo.toml are local-dev only); we strip them so Cargo resolves molrs
# from crates.io. molpack is checked out at the workspace root so
# benchmark-action has a git repo for the gh-pages push.
on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    name: criterion benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build against published molrs (drop local path deps)
        run: |
          sed -i -E 's#path = "\.\./molrs/[^"]*", ##g' Cargo.toml

      - name: Run e2e benches (fast cases, 3 samples)
        run: >
          cargo bench --bench pack_end_to_end --features io --
          'pack_(mixture|interface|bilayer)'
          --output-format bencher
          | tee output.txt

      # benchmark-action switches to gh-pages in this same tree; restore the
      # sed-modified Cargo.toml (+ build-updated lock) so the switch isn't
      # blocked by dirty tracked files. output.txt is untracked and survives.
      - name: Restore working tree
        run: git checkout -- .

      - name: Store + compare benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: molpack criterion
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: false

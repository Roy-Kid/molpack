name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  # ── fast gates (run in parallel) ──────────────────────────────────────────

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  python-lint:
    name: python lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install typecheck dep group
        run: pip install --group typecheck
        working-directory: molpack/python
      - name: ruff format
        run: ruff format --check .
        working-directory: molpack/python
      - name: ruff lint
        run: ruff check .
        working-directory: molpack/python
      - name: ty check
        run: ty check python tests examples
        working-directory: molpack/python

  # ── rust lint gate ─────────────────────────────────────────────────────────

  clippy:
    name: clippy
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: MolCrafts/molrs
          path: molrs
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: molpack
      - run: cargo clippy --all-targets --features cli -- -D warnings
        working-directory: molpack

  # ── full checks (blocked on both lint gates) ───────────────────────────────

  test:
    name: test
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: MolCrafts/molrs
          path: molrs
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: molpack
      - name: Cache test data
        uses: actions/cache@v5
        with:
          path: molrs/molrs-core/target/tests-data
          key: ${{ runner.os }}-test-data-${{ hashFiles('molrs/scripts/fetch-test-data.sh') }}
      - name: Fetch test data
        run: bash scripts/fetch-test-data.sh
        working-directory: molrs
      - name: Test (library + examples)
        run: cargo test --lib --tests --examples
        working-directory: molpack
      - name: Test CLI (cli feature)
        run: cargo test --test cli --features cli
        working-directory: molpack
      - name: Benches build
        run: cargo bench --no-run
        working-directory: molpack

  python:
    name: python bindings
    needs: [clippy, python-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: MolCrafts/molrs
          path: molrs
      - uses: actions/checkout@v6
        with:
          path: molpack
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: molpack
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Build + test Python bindings
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install --group dev
          maturin develop --release
          pytest -v
        working-directory: molpack/python
